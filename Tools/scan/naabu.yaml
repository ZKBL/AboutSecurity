id: ext_naabu
name: Naabu 端口扫描
description: "使用 naabu 进行快速 SYN/CONNECT 端口扫描，支持 IPv4/IPv6、CDN 排除、nmap 集成，轻量高效"
category: scan
binary: naabu
version_cmd: "naabu -version"

parameters:
  - name: target
    type: string
    description: "扫描目标（IP、域名或 CIDR）"
    required: true
  - name: ports
    type: string
    description: "端口范围（如 80,443,1-1000）或 top-ports 值（100/1000/full）"
    default: "100"
  - name: scan_type
    type: string
    description: "扫描类型：s(SYN 半开) / c(CONNECT 全连接)"
    default: "c"
    enum: ["s", "c"]
  - name: rate
    type: string
    description: "每秒发包速率"
    default: "1000"

command_template: |
  -host {{.target}}
  {{if eq .ports "100" "1000" "full"}}-top-ports {{.ports}}{{else}}-p {{.ports}}{{end}}
  -s {{.scan_type}}
  -rate {{.rate}}
  -o {{.OutputFile}}
  -silent

output:
  mode: file
  file_pattern: "{{.OutputFile}}"
  parser: line
  line:
    skip_empty: true
    split: ":"
    fields:
      - { name: host, index: 0 }
      - { name: port, index: 1 }

findings_mapping:
  type: info
  severity: info
  target_field: host
  detail_template: "{{.host}}:{{.port}} open"

constraints:
  timeout: 300s
  max_concurrent: 2
